<h2 mat-dialog-title>Edti Reserve Totals</h2>
<mat-dialog-content>
  <form [formGroup]="editForm" >
    <mat-form-field>
      <mat-label>Quicken Amount</mat-label>
      <input matInput formControlName="quickenTotal" placeholder="Quicken Amount" />

    </mat-form-field>
    <mat-form-field>
      <mat-label>CMA Total</mat-label>
      <input matInput formControlName="cmaTotal" placeholder="CMA Toeal" />

    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton="tonal" [disabled]="!editForm.valid" (click)="onSubmit()">Save</button>
  <button matButton="tonal" (click)="onClose()">Close</button>
</mat-dialog-actions>

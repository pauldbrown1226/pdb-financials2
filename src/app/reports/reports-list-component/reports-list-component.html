  <div class="parent">
    <div class="child">
    &nbsp;
    <button matButton="filled" (click)="onReset()">Reset</button>
    &nbsp;
    <button matButton="filled" (click)="openAddReport()">Add Report</button>
    <p>&nbsp;</p>
  </div>
  </div>
  @if (isLoading) {
  <div style="text-align: center">
    <app-loading-spinner></app-loading-spinner>
  </div>
  }

  <div class="table-container">
    
    <table mat-table [dataSource]="dataSource" [trackBy]="trackBy">


      <!-- Name -->
      <ng-container matColumnDef="reportName">
        <th mat-header-cell *matHeaderCellDef>
            Report</th>
        <td mat-cell *matCellDef="let element">
          <a routerLink="/displayReport/{{element.reportId}}">{{ element.reportName }}</a>

      </ng-container>

      <!-- rport Date -->
      <ng-container matColumnDef="reportDate">
        <th mat-header-cell *matHeaderCellDef>Report DateType</th>
        <td mat-cell *matCellDef="let element">{{ element.reportDate }}</td>
      </ng-container>


      <!-- total expenses -->
      <ng-container matColumnDef="expensesTotal">
        <th mat-header-cell *matHeaderCellDef>Total Expenses</th>
        <td mat-cell *matCellDef="let element">{{ element.expensesTotal }}</td>
      </ng-container>
     
      
      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef>Delete</th>
        <td mat-cell *matCellDef="let element">
          <!-- Content not in the datasource -->
          <a class="active" style="cursor: pointer; color: #007bff" (click)="openDeleteConfirmation(element)"
            >Delete</a
          >
        </td>
      </ng-container>
      
      <tr mat-header-row *matHeaderRowDef="displayedColumns sticky:true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

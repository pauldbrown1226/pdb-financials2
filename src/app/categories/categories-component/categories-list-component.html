<!-- <div style="background-color: rgb(185, 140, 168)"> -->

<div class="parent">
  <div class="child">
    &nbsp;
    <button matButton="filled" (click)="onReset()">Reset</button>
    &nbsp;
    <button matButton="filled" (click)="openEditCategory('add', null)">Add Category</button>
    <p>&nbsp;</p>
  </div>
</div>
@if (isLoading) {
<div style="text-align: center">
  <app-loading-spinner></app-loading-spinner>
</div>
}

<div class="table-container">
  <table mat-table [dataSource]="dataSource" [trackBy]="trackBy">
    <!-- Label -->
    <ng-container matColumnDef="label">
      <th mat-header-cell *matHeaderCellDef>Label</th>
      <td mat-cell *matCellDef="let element">
        <a
          class="active"
          style="cursor: pointer; color: #007bff"
          (click)="openEditCategory('edit', element)"
          >{{ element.label }}</a
        >
      </td>
    </ng-container>

    <!-- Name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <!-- type -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let element">{{ element.type }}</td>
    </ng-container>

    <!-- subType -->
    <ng-container matColumnDef="subType">
      <th mat-header-cell *matHeaderCellDef>Sub Type</th>
      <td mat-cell *matCellDef="let element">{{ element.subType }}</td>
    </ng-container>

    <!-- subType -->
    <ng-container matColumnDef="catOrder">
      <th mat-header-cell *matHeaderCellDef>Order</th>
      <td mat-cell *matCellDef="let element">{{ element.catOrder }}</td>
    </ng-container>

    <!-- subType -->
    <ng-container matColumnDef="reserve">
      <th mat-header-cell *matHeaderCellDef>Reserve</th>
      <td mat-cell *matCellDef="let element">{{ element.reserve }}</td>
    </ng-container>

    <!-- subType -->
    <ng-container matColumnDef="budget">
      <th mat-header-cell *matHeaderCellDef>Budget</th>
      <td mat-cell *matCellDef="let element">{{ element.budget }}</td>
    </ng-container>

    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef>Delete</th>
      <td mat-cell *matCellDef="let element">
        <!-- Content not in the datasource -->
        <a
          class="active"
          style="cursor: pointer; color: #007bff"
          (click)="openDeleteConfirmation(element)"
          >Delete</a
        >
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>


<div style="background-color: rgb(220, 138, 176);">
<mat-dialog-content>{{title}}</mat-dialog-content>
<mat-dialog-actions align="end">
  @if (deleted || isError) {
  <button matButton= tonal (click)="closeModal()">Close</button>
  } @else {
  <button matButton= tonal (click)="confirm()">Yes</button>
  <button matButton= tonal (click)="closeModal()">Close</button>
  }
</mat-dialog-actions>
</div>

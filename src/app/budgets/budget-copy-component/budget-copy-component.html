<h2 mat-dialog-title>Enter New Budget Name</h2>
<mat-dialog-content>
  <form [formGroup]="editForm" class="grid-container">

    <mat-form-field>
      <mat-label>New Budget Name</mat-label>
      <input matInput formControlName="newBudgetName" placeholder="New Budget Name" />
      @if(editForm.dirty && editForm.get('newBudgetName').value.length === 0) {
      <mat-error>The Name is required</mat-error>
      }
    </mat-form-field>
  </form>
  <mat-dialog-actions>
    <button matButton="tonal" (click)="onClose()">Close</button>
    <button matButton= tonal  [disabled]="!editForm.valid" 
    (click)="onSubmit()">Save</button>
  </mat-dialog-actions>
</mat-dialog-content>

<div class="parent">
  <div class="child">
    &nbsp;
    <button matButton="filled" (click)="onReset()">Reset</button>
    &nbsp;
    <!-- <button matButton="filled" (click)="onOpenEditBudget()">Add Budget</button> -->
    <p>&nbsp;</p>
  </div>
</div>
@if (isLoading) {
<div style="text-align: center">
  <app-loading-spinner></app-loading-spinner>
</div>
}

<div class="table-container">
  <table mat-table [dataSource]="dataSource" [trackBy]="trackBy">
    <!-- Name -->
    <ng-container matColumnDef="budgetName">
      <th mat-header-cell *matHeaderCellDef>Report</th>
      <td mat-cell *matCellDef="let element">
        <a routerLink="/displayBudget/{{ element.budgetId }}">{{ element.budgetName }}</a>
      </td></ng-container
    >

    <ng-container matColumnDef="budgetDate">
      <th mat-header-cell *matHeaderCellDef>Budget Date</th>
      <td mat-cell *matCellDef="let element">
        {{ element.budgetDate }}
      </td></ng-container
    >

    <ng-container matColumnDef="annualExpenses">
      <th mat-header-cell *matHeaderCellDef>Annual Amount</th>
      <td mat-cell *matCellDef="let element">
        {{ element.annualExpTotal | currency }}
      </td></ng-container
    >

    <ng-container matColumnDef="monthlyExpenses">
      <th mat-header-cell *matHeaderCellDef>Monthly Amount</th>
      <td mat-cell *matCellDef="let element">
        {{ element.monthlyExpTotal | currency }}
      </td></ng-container
    >

    <ng-container matColumnDef="copy">
      <th mat-header-cell *matHeaderCellDef>Copy</th>
      <td mat-cell *matCellDef="let element">
        <a
          class="active"
          style="cursor: pointer; color: #007bff"
          (click)="onOpenCopyBudget(element)"
          >Copy</a
        >
      </td></ng-container
    >

    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef>Delete</th>
      <td mat-cell *matCellDef="let element">
        <!-- Content not in the datasource -->
        <a
          class="active"
          style="cursor: pointer; color: #007bff"
          (click)="openDeleteConfirmation(element)"
          >Delete</a
        >
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
